<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBroke - Bankruptcy Form Assistant</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --brand-dark: #0f172a;
            --accent-blue: #2563eb;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --success-green: #059669;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { display: flex; height: 100vh; background-color: var(--bg-main); color: var(--text-primary); overflow: hidden; }

        .document-view { flex: 1; display: flex; flex-direction: column; padding: 1.5rem; }
        
        .header { 
            margin-bottom: 1rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .header-links {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }
        
        .header h1 { font-size: 1.5rem; color: var(--brand-dark); }
        .header p { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
        
        .market-link-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--bg-panel);
            color: var(--accent-blue);
            text-decoration: none;
            border: 2px solid var(--accent-blue);
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.1);
            text-align: center;
        }

        .market-link-btn:hover {
            background-color: var(--accent-blue);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .pdf-wrapper { flex: 1; background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--border-light); overflow: hidden; }
        embed { width: 100%; height: 100%; border: none; }

        /* Sidebar Styles */
        .status-sidebar { 
            width: 400px; 
            min-width: 350px; 
            background-color: var(--bg-panel); 
            border-left: 1px solid var(--border-light); 
            display: flex; 
            flex-direction: column; 
        }

        .sidebar-header { 
            padding: 1.5rem; 
            background-color: var(--brand-dark); 
            color: white; 
        }
        
        .sidebar-header h2 { font-size: 1.1rem; }
        .sidebar-header p { font-size: 0.8rem; color: #cbd5e1; margin-top: 4px; }

        /* Progress Bar Styles */
        .progress-container {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            background: #f1f5f9;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-blue);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #progressText {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Checklist Styles */
        .checklist-history { 
            flex: 1; 
            padding: 1.5rem; 
            overflow-y: auto; 
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .check-item:hover { background: #f8fafc; }

        .check-item input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .check-item span { font-size: 0.9rem; line-height: 1.4; }

        .sidebar-footer { padding: 1.5rem; border-top: 1px solid var(--border-light); }
    </style>
</head>
<body>

    <main class="document-view">
        <div class="header">
            <div>
                <h1>SuperBroke</h1>
                <p>Serverless Secure DIY Bankruptcy Tool.</p>
            </div>
            <div class="header-links">
                <a href="market.html" class="market-link-btn">Find an Attorney</a>
                <a href="https://www.pay.gov/public/form/start/808852929" class="market-link-btn">Pay Filing Fee</a>
                <a href="https://www.wawb.uscourts.gov/content/electronic-filing-option-parties-without-attorney" class="market-link-btn">eFile</a>
                <a href="guide/" class="market-link-btn">Guide</a>
            </div>
        </div>
        <div class="pdf-wrapper">
            <embed src="form_b101.pdf" type="application/pdf" />
        </div>
    </main>

    <aside class="status-sidebar">
        <div class="sidebar-header">
            <h2>Filing Progress</h2>
            <p>Minimum Chapter 7 Requirements</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
            <span id="progressText">0% Complete</span>
        </div>

        <div class="checklist-history">
            <form id="filingChecklist">
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>Form 101:</b> Voluntary Petition</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>Schedules A/B:</b> Property</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>Schedule C:</b> Exempt Property</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>Schedules D-F:</b> Creditor Lists</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>Schedules I/J:</b> Income & Expenses</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>SOFA:</b> Statement of Financial Affairs</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="10">
                    <span><b>Form 122A-1:</b> Means Test</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="15">
                    <span>Credit Counseling Certificate</span>
                </label>
                <label class="check-item">
                    <input type="checkbox" data-weight="15">
                    <span>Recent Tax Returns (2 Years)</span>
                </label>
            </form>
        </div>

        <div class="sidebar-footer">
            <button id="exportBtn" class="market-link-btn" style="width: 100%;">Prepare Filing Packet</button>
        </div>
    </aside>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checklist = document.getElementById('filingChecklist');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            const updateProgress = () => {
                const checkboxes = checklist.querySelectorAll('input[type="checkbox"]');
                let totalWeight = 0;
                let completedWeight = 0;

                checkboxes.forEach(cb => {
                    const weight = parseInt(cb.getAttribute('data-weight'));
                    totalWeight += weight;
                    if (cb.checked) {
                        completedWeight += weight;
                    }
                });

                const percentage = Math.round((completedWeight / totalWeight) * 100);
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `${percentage}% Complete`;
                
                if (percentage === 100) {
                    progressText.textContent = "Ready to File!";
                    progressText.style.color = "var(--success-green)";
                } else {
                    progressText.style.color = "var(--text-primary)";
                }
            };

            // Initialize listener
            checklist.addEventListener('change', updateProgress);
            
            // Optional: Initial calculation if any items are pre-checked
            updateProgress();
        });
    </script>
</body>
</html>
