<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankruptcy Form Assistant</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --brand-dark: #0f172a;
            --accent-blue: #2563eb;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { display: flex; height: 100vh; background-color: var(--bg-main); color: var(--text-primary); overflow: hidden; }

        .document-view { flex: 1; display: flex; flex-direction: column; padding: 1.5rem; }
        
        /* Updated header to Flexbox for side-by-side layout */
        .header { 
            margin-bottom: 1rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .header-links {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }
        
        .header h1 { font-size: 1.5rem; color: var(--brand-dark); }
        .header p { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
        
        /* New attractive button styling */
        .market-link-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--bg-panel);
            color: var(--accent-blue);
            text-decoration: none;
            border: 2px solid var(--accent-blue);
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.1);
        }

        .market-link-btn:hover {
            background-color: var(--accent-blue);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .pdf-wrapper { flex: 1; background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--border-light); overflow: hidden; }
        embed { width: 100%; height: 100%; border: none; }

        .ai-sidebar { width: 400px; min-width: 350px; background-color: var(--bg-panel); border-left: 1px solid var(--border-light); display: flex; flex-direction: column; }
        .chat-header { padding: 1.5rem; border-bottom: 1px solid var(--border-light); background-color: var(--brand-dark); color: white; }
        .chat-header h2 { font-size: 1.1rem; }
        .chat-header p { font-size: 0.8rem; color: #cbd5e1; margin-top: 4px; }
        
        .chat-history { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; }
        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; }
        .msg-ai { background-color: var(--bg-main); border: 1px solid var(--border-light); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background-color: var(--accent-blue); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-input { padding: 1.5rem; border-top: 1px solid var(--border-light); display: flex; gap: 10px; background-color: var(--bg-panel); }
        .chat-input input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-light); border-radius: 6px; outline: none; }
        .chat-input button { padding: 0 20px; background-color: var(--accent-blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .chat-input button:disabled { background-color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <main class="document-view">
        <div class="header">
            <div>
                <h1>SuperBroke</h1>
                <p>DIY Bankruptcy...but with AI powered Attorneys.</p>
            </div>
            <div class="header-links">
                <a href="market.html" class="market-link-btn">Find an Attorney</a>
                <a href="https://www.pay.gov/public/form/start/808852929" class="market-link-btn">Pay Filling Fee</a>
                <a href="https://www.wawb.uscourts.gov/content/electronic-filing-option-parties-without-attorney" class="market-link-btn">eFile</a>
            </div>
        </div>
        <div class="pdf-wrapper">
            <embed src="form_b101.pdf" type="application/pdf" />
        </div>
    </main>

    <aside class="ai-sidebar">
        <div class="chat-header">
            <h2>AI Assistant</h2>
            <p>I'm here to help you understand your forms.</p>
        </div>
        
        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-ai">
                Hello. I have loaded Form 101 into my memory. What section are you currently working on?
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask a question about the form...">
            <button type="button" id="sendBtn">Send</button>
        </div>
    </aside>

    <script>
        // State
        let conversationHistory = [
            {
                role: "user",
                parts: [
                    { text: "System Instruction: You are a helpful legal AI assistant. Your goal is to help users understand Official Form 101. Do not provide formal legal advice, but explain terminology clearly based on the attached PDF document." }
                    // We will inject the PDF data here once it loads
                ]
            },
            {
                role: "model",
                parts: [{ text: "Understood. I am ready to assist with Form 101." }]
            }
        ];

        // DOM Elements
        const chatHistoryContainer = document.getElementById('chatHistory');
        const chatInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(text, sender) {
            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble', sender === 'user' ? 'msg-user' : 'msg-ai');
            bubble.textContent = text;
            chatHistoryContainer.appendChild(bubble);
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight; 
        }

        // Helper function to convert the PDF to base64
        async function loadPdfIntoMemory() {
            try {
                sendBtn.disabled = true;
                chatInput.placeholder = "Loading PDF into AI memory...";

                const response = await fetch('form_b101.pdf');
                const blob = await response.blob();
                
                // Convert blob to base64
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const base64data = reader.result.split(',')[1];
                    
                    // Attach the PDF to the first instruction message
                    conversationHistory[0].parts.push({
                        inlineData: {
                            data: base64data,
                            mimeType: 'application/pdf'
                        }
                    });

                    chatInput.placeholder = "Ask a question about the form...";
                    sendBtn.disabled = false;
                }
            } catch (error) {
                console.error("Failed to load PDF:", error);
                chatInput.placeholder = "Failed to load PDF context.";
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Update UI
            appendMessage(text, 'user');
            chatInput.value = '';
            sendBtn.disabled = true;
            
            // Add to state
            conversationHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conversationHistory })
                });
                
                const data = await response.json();
                
                // Explicitly check for the HTML error payload
                if (!response.ok) {
                    throw new Error(data.error || "Server returned an error");
                }

                // Update UI and State with AI response
                appendMessage(data.reply, 'ai');
                conversationHistory.push({ role: "model", parts: [{ text: data.reply }] });

            } catch (error) {
                console.error(error);
                appendMessage("Sorry, I encountered an error talking to the server.", 'ai');
                // Remove the failed user message from history so they can try again
                conversationHistory.pop(); 
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        // Load the PDF into memory as soon as the page loads
        window.addEventListener('DOMContentLoaded', loadPdfIntoMemory);
    </script>
</body>
</html>
