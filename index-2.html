<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankruptcy Form Assistant</title>
    <style>
        /* [Keep the exact same CSS from the previous step here] */
        :root {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --brand-dark: #0f172a;
            --accent-blue: #2563eb;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { display: flex; height: 100vh; background-color: var(--bg-main); color: var(--text-primary); overflow: hidden; }

        .document-view { flex: 1; display: flex; flex-direction: column; padding: 1.5rem; }
        .header { margin-bottom: 1rem; }
        .header h1 { font-size: 1.5rem; color: var(--brand-dark); }
        .header p { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .pdf-wrapper { flex: 1; background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--border-light); overflow: hidden; }
        embed { width: 100%; height: 100%; border: none; }

        .ai-sidebar { width: 400px; min-width: 350px; background-color: var(--bg-panel); border-left: 1px solid var(--border-light); display: flex; flex-direction: column; }
        .chat-header { padding: 1.5rem; border-bottom: 1px solid var(--border-light); background-color: var(--brand-dark); color: white; }
        .chat-header h2 { font-size: 1.1rem; }
        .chat-header p { font-size: 0.8rem; color: #cbd5e1; margin-top: 4px; }
        
        .chat-history { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; }
        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; }
        .msg-ai { background-color: var(--bg-main); border: 1px solid var(--border-light); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background-color: var(--accent-blue); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-input { padding: 1.5rem; border-top: 1px solid var(--border-light); display: flex; gap: 10px; background-color: var(--bg-panel); }
        .chat-input input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-light); border-radius: 6px; outline: none; }
        .chat-input button { padding: 0 20px; background-color: var(--accent-blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .chat-input button:disabled { background-color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <main class="document-view">
        <div class="header">
            <div>
                <h1>Official Form 101</h1>
                <p>Voluntary Petition for Individuals Filing for Bankruptcy</p>
            </div>
        </div>
        <div class="pdf-wrapper">
            <embed src="form_b101.pdf" type="application/pdf" />
        </div>
    </main>

    <aside class="ai-sidebar">
        <div class="chat-header">
            <h2>AI Assistant</h2>
            <p>I'm here to help you understand your forms.</p>
        </div>
        
        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-ai">
                Hello. I know dealing with Official Form 101 can be overwhelming. I can help explain the legal terminology. What section are you currently working on?
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask a question about the form...">
            <button type="button" id="sendBtn">Send</button>
        </div>
    </aside>

    <script>
        // --- 1. Configuration ---
        // INSERT YOUR API KEY HERE FOR THE LOCAL DEMO
        const API_KEY = 'AIzaSyAJlRHOzp3g7Rra_grjOUBwctMBBCINk1A'; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        // --- 2. State ---
        // We maintain the conversation history to give the AI context.
        // We start by giving it a hidden system instruction to set its persona.
        let conversationHistory = [
            {
                role: "user",
                parts: [{ text: "System Instruction: You are a helpful legal AI assistant for a startup. Your goal is to help users understand Official Form 101 (Voluntary Petition for Individuals Filing for Bankruptcy). Do not provide formal legal advice, but explain terminology clearly and concisely." }]
            },
            {
                role: "model",
                parts: [{ text: "Understood. I am ready to assist with Form 101." }]
            }
        ];

        // --- 3. DOM Elements ---
        const chatHistoryContainer = document.getElementById('chatHistory');
        const chatInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // --- 4. Functions ---
        function appendMessage(text, sender) {
            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble', sender === 'user' ? 'msg-user' : 'msg-ai');
            bubble.textContent = text;
            chatHistoryContainer.appendChild(bubble);
            chatHistoryContainer.scrollTop = chatHistoryContainer.scrollHeight; 
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Update UI
            appendMessage(text, 'user');
            chatInput.value = '';
            sendBtn.disabled = true;
            
            // Add user message to state
            conversationHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                // Call the Gemini REST API directly
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: conversationHistory })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                // Extract the AI's reply from the response
                const aiReply = data.candidates[0].content.parts[0].text;
                
                // Update UI and State
                appendMessage(aiReply, 'ai');
                conversationHistory.push({ role: "model", parts: [{ text: aiReply }] });

            } catch (error) {
                console.error("API Error:", error);
                appendMessage("Sorry, I encountered an error. Check the console and ensure your API key is correct.", 'ai');
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        // --- 5. Event Listeners ---
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
