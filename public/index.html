<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bankruptcy Form Assistant</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script>
            pdfjsLib.GlobalWorkerOptions.workerSrc =
                "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        </script>

        <style>
            :root {
                --bg-main: #f8fafc;
                --bg-panel: #ffffff;
                --brand-dark: #0f172a;
                --accent-blue: #2563eb;
                --text-primary: #334155;
                --text-secondary: #64748b;
                --border-light: #e2e8f0;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: "Inter", sans-serif;
            }

            body {
                display: flex;
                height: 100vh;
                background-color: var(--bg-main);
                color: var(--text-primary);
                overflow: hidden;
            }

            .document-view {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 1.5rem;
                overflow: hidden;
            }

            .header {
                margin-bottom: 1rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .header h1 {
                font-size: 1.5rem;
                color: var(--brand-dark);
            }
            .header p {
                font-size: 0.9rem;
                color: var(--text-secondary);
                margin-top: 0.25rem;
            }

            .market-link-btn {
                display: inline-block;
                padding: 10px 20px;
                background-color: var(--bg-panel);
                color: var(--accent-blue);
                text-decoration: none;
                border: 2px solid var(--accent-blue);
                border-radius: 6px;
                font-weight: 600;
                font-size: 0.95rem;
                transition: all 0.2s ease;
            }
            .market-link-btn:hover {
                background-color: var(--accent-blue);
                color: white;
            }

            /* Custom PDF Viewer Controls */
            .pdf-controls {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 15px;
                padding: 10px;
                background: var(--brand-dark);
                color: white;
                border-radius: 8px 8px 0 0;
            }
            .pdf-controls button {
                padding: 6px 12px;
                background: var(--accent-blue);
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            .pdf-controls button:disabled {
                background: #64748b;
                cursor: not-allowed;
            }

            .pdf-wrapper {
                flex: 1;
                background: #e2e8f0;
                border-radius: 0 0 8px 8px;
                border: 1px solid var(--border-light);
                overflow: auto;
                display: flex;
                justify-content: center;
                padding: 20px;
            }

            canvas {
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            } /* Make the canvas look like a piece of paper */

            .ai-sidebar {
                width: 400px;
                min-width: 350px;
                background-color: var(--bg-panel);
                border-left: 1px solid var(--border-light);
                display: flex;
                flex-direction: column;
            }
            .chat-header {
                padding: 1.5rem;
                border-bottom: 1px solid var(--border-light);
                background-color: var(--brand-dark);
                color: white;
            }
            .chat-history {
                flex: 1;
                padding: 1.5rem;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
            }
            .msg-bubble {
                max-width: 85%;
                padding: 12px 16px;
                border-radius: 8px;
                font-size: 0.95rem;
                line-height: 1.5;
            }
            .msg-ai {
                background-color: var(--bg-main);
                border: 1px solid var(--border-light);
                align-self: flex-start;
                border-bottom-left-radius: 2px;
            }
            .msg-user {
                background-color: var(--accent-blue);
                color: white;
                align-self: flex-end;
                border-bottom-right-radius: 2px;
            }
            .chat-input {
                padding: 1.5rem;
                border-top: 1px solid var(--border-light);
                display: flex;
                gap: 10px;
                background-color: var(--bg-panel);
            }
            .chat-input input {
                flex: 1;
                padding: 12px 16px;
                border: 1px solid var(--border-light);
                border-radius: 6px;
                outline: none;
            }
            .chat-input button {
                padding: 0 20px;
                background-color: var(--accent-blue);
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <main class="document-view">
            <div class="header">
                <div>
                    <h1>SuperBroke</h1>
                    <p>DIY Bankruptcy...but with AI powered Attorneys.</p>
                </div>
                <a href="market.html" class="market-link-btn"
                    >Find an Attorney</a
                >
            </div>

            <div class="pdf-controls">
                <button id="prev-page">Previous</button>
                <span
                    >Page: <span id="page-num"></span> /
                    <span id="page-count"></span
                ></span>
                <button id="next-page">Next</button>
            </div>
            <div class="pdf-wrapper">
                <canvas id="pdf-render"></canvas>
            </div>
        </main>

        <aside class="ai-sidebar">
            <div class="chat-header">
                <h2>AI Assistant</h2>
                <p>I'm here to help you understand your forms.</p>
            </div>

            <div class="chat-history" id="chatHistory">
                <div class="msg-bubble msg-ai">
                    Hello. I can see the form on your screen. Navigate to the
                    page you need help with and ask me a question!
                </div>
            </div>

            <div class="chat-input">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Ask a question about this page..."
                />
                <button type="button" id="sendBtn">Send</button>
            </div>
        </aside>

        <script>
            // --- PDF Rendering Logic ---
            const url = "form_b101.pdf";
            let pdfDoc = null,
                pageNum = 1,
                pageIsRendering = false,
                pageNumIsPending = null;

            const scale = 1.5; // Adjusts the visual quality of the PDF
            const canvas = document.getElementById("pdf-render");
            const ctx = canvas.getContext("2d");

            const renderPage = (num) => {
                pageIsRendering = true;
                pdfDoc.getPage(num).then((page) => {
                    const viewport = page.getViewport({ scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderCtx = {
                        canvasContext: ctx,
                        viewport: viewport,
                    };

                    page.render(renderCtx).promise.then(() => {
                        pageIsRendering = false;
                        if (pageNumIsPending !== null) {
                            renderPage(pageNumIsPending);
                            pageNumIsPending = null;
                        }
                    });
                    document.getElementById("page-num").textContent = num;
                });
            };

            const queueRenderPage = (num) => {
                if (pageIsRendering) pageNumIsPending = num;
                else renderPage(num);
            };

            const showPrevPage = () => {
                if (pageNum <= 1) return;
                pageNum--;
                queueRenderPage(pageNum);
            };

            const showNextPage = () => {
                if (pageNum >= pdfDoc.numPages) return;
                pageNum++;
                queueRenderPage(pageNum);
            };

            // Load PDF Document
            pdfjsLib.getDocument(url).promise.then((pdfDoc_) => {
                pdfDoc = pdfDoc_;
                document.getElementById("page-count").textContent =
                    pdfDoc.numPages;
                renderPage(pageNum);
            });

            document
                .getElementById("prev-page")
                .addEventListener("click", showPrevPage);
            document
                .getElementById("next-page")
                .addEventListener("click", showNextPage);

            // --- Chat AI Logic ---
            let conversationHistory = [
                {
                    role: "user",
                    parts: [
                        {
                            text: "System Instruction: You are a helpful legal AI assistant. The user will ask you questions and provide an image of the specific page of Official Form 101 they are currently looking at. Use the provided image to answer their questions accurately.",
                        },
                    ],
                },
                {
                    role: "model",
                    parts: [
                        {
                            text: "Understood. I will use the provided images to assist the user.",
                        },
                    ],
                },
            ];

            const chatHistoryContainer = document.getElementById("chatHistory");
            const chatInput = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");

            function appendMessage(text, sender) {
                const bubble = document.createElement("div");
                bubble.classList.add(
                    "msg-bubble",
                    sender === "user" ? "msg-user" : "msg-ai",
                );
                bubble.textContent = text;
                chatHistoryContainer.appendChild(bubble);
                chatHistoryContainer.scrollTop =
                    chatHistoryContainer.scrollHeight;
            }

            async function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;

                // 1. Grab the image of the CURRENT canvas state
                // We use JPEG instead of PNG to drastically reduce the base64 string size
                const base64Image = canvas
                    .toDataURL("image/jpeg", 0.8)
                    .split(",")[1];

                appendMessage(text, "user");
                chatInput.value = "";
                sendBtn.disabled = true;

                try {
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            conversationHistory: conversationHistory,
                            message: text,
                            currentViewBase64: base64Image,
                        }),
                    });

                    const data = await response.json();

                    if (!response.ok) throw new Error(data.error);

                    // We only store the TEXT in the local history, keeping memory usage incredibly low
                    conversationHistory.push({
                        role: "user",
                        parts: [{ text: text }],
                    });

                    appendMessage(data.reply, "ai");
                    conversationHistory.push({
                        role: "model",
                        parts: [{ text: data.reply }],
                    });
                } catch (error) {
                    console.error(error);
                    appendMessage(
                        "Sorry, I encountered an error. Check Vercel logs.",
                        "ai",
                    );
                } finally {
                    sendBtn.disabled = false;
                    chatInput.focus();
                }
            }

            sendBtn.addEventListener("click", sendMessage);
            chatInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter" && !sendBtn.disabled) sendMessage();
            });
        </script>
    </body>
</html>
